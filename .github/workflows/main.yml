name: Build llama.cpp Android ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            cmake \
            make \
            git \
            unzip \
            zip \
            wget \
            curl \
            build-essential

      - name: Build
        run: |
          cmake --build build --parallel

      - name: Strip
        run: |
          STRIP=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip
          find build/bin -type f -executable -exec "$STRIP" {} \; || true

      - name: Pack
        run: |
          mkdir out
          cp -a build/bin/* out/
          cd out
          zip -r ../llama-android-arm64.zip .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: *llama*
          path: llama-android-arm64.zip
