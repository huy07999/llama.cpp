name: Build llama.cpp Android ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            cmake \
            make \
            git \
            unzip \
            zip \
            wget \
            curl \
            build-essential;git clone --recursive https://github.com/ggml-org/llama.cpp.git;cd llama.cpp

      - name: Build
        run: |
          cmake --build build --parallel
      - name: Pack
        run: |
          mkdir out
          cp -a build/bin/* out/
          cd out
          zip -r ../llama-android-arm64.zip .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: llama-android-arm64
          path: llama-android-arm64.zip
